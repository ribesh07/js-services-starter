<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docker Logs - Live</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #1e1e1e;
      --panel: #2d2d2d;
      --border: #444;
      --text: #d4d4d4;
      --muted: #aaa;
      --error: #f56565;
      --warn: #ed8936;
      --info: #4299e1;
      --success: #48bb78;
    }

    html,
    body {
       width: 100%;
  height: 100%;
  overflow: auto;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--panel);
      border-bottom: 2px solid var(--border);
      padding: clamp(12px, 1vw, 20px) clamp(16px, 1.5vw, 28px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }

    .header h1 {
      color: white;
      font-size: clamp(16px, 1vw, 24px);
      font-weight: 600;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    button {
      padding: clamp(8px, 0.8vw, 12px) clamp(14px, 1vw, 20px);
      border: none;
      border-radius: 6px;
      font-size: clamp(12px, 0.75vw, 14px);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .btn-clear {
      background: var(--warn);
      color: white;
    }

    .btn-clear:hover {
      background: #dd6b20;
    }

    .btn-close {
      background: var(--error);
      color: white;
    }

    .btn-close:hover {
      background: #e53e3e;
    }

    .log-container {
      flex: 1;
      min-height: 0;
      padding: clamp(14px, 1vw, 24px);
      background: var(--bg);
      color: var(--text);
      font-family: Consolas, 'Courier New', monospace;
      font-size: clamp(12px, 0.75vw, 15px);
      line-height: 1.6;
        overflow: auto;
  white-space: pre;
  word-break: normal;
    }

    .log-container::-webkit-scrollbar {
      width: 10px;
    }

    .log-container::-webkit-scrollbar-track {
      background: var(--panel);
    }

    .log-container::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 8px;
    }

    .log-container::-webkit-scrollbar-thumb:hover {
      background: #666;
    }

    .log-line {
      margin-bottom: 3px;
    }

    .log-error {
      color: var(--error);
    }

    .log-warning {
      color: var(--warn);
    }

    .log-info {
      color: var(--info);
    }

    .log-success {
      color: var(--success);
    }

    .status-bar {
      background: var(--panel);
      border-top: 2px solid var(--border);
      padding: clamp(10px, 0.8vw, 16px) clamp(16px, 1.5vw, 28px);
      color: var(--muted);
      font-size: clamp(11px, 0.7vw, 14px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
    }

    .status-active {
      background: var(--success);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-inactive {
      background: #718096;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.45;
      }
    }

    /* Small desktop / laptop */
    @media (max-width: 1200px) {
      .header h1 {
        font-size: 16px;
      }

      button {
        padding: 8px 14px;
      }

      .log-container {
        font-size: 12px;
      }
    }

    /* Large desktop / 2K / ultrawide */
    @media (min-width: 2000px) {
      .log-container {
        max-width: 100%;
        font-size: 16px;
      }

      .header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📋 Docker Logs - Live View</h1>

    <div class="controls">
      <button class="btn-clear" id="clearBtn">Clear Logs</button>
      <button class="btn-close" id="closeBtn">Close</button>
    </div>
  </div>

  <div class="log-container" id="logContainer">
    <div class="log-line log-info">Waiting for log data...</div>
  </div>

  <div class="status-bar">
    <div>
      <span class="status-indicator status-active" id="statusIndicator"></span>
      <span id="statusText">Streaming logs...</span>
    </div>
    <div id="lineCount">Lines: 0</div>
  </div>

  <script>
    let lineCount = 0;
    const logContainer = document.getElementById('logContainer');
    const statusIndicator = document.getElementById('statusIndicator');
    const statusText = document.getElementById('statusText');
    const lineCountEl = document.getElementById('lineCount');
    const clearBtn = document.getElementById('clearBtn');
    const closeBtn = document.getElementById('closeBtn');

    function appendLog(text) {
      const lines = text.split('\n');

      lines.forEach(line => {
        if (line.trim()) {
          const div = document.createElement('div');
          div.className = 'log-line';

          if (line.toLowerCase().includes('error')) {
            div.classList.add('log-error');
          } else if (line.toLowerCase().includes('warn')) {
            div.classList.add('log-warning');
          } else if (line.toLowerCase().includes('info')) {
            div.classList.add('log-info');
          } else if (line.toLowerCase().includes('success')) {
            div.classList.add('log-success');
          }

          div.textContent = line;
          logContainer.appendChild(div);
          lineCount++;
        }
      });

      logContainer.scrollTop = logContainer.scrollHeight;
      lineCountEl.textContent = `Lines: ${lineCount}`;
    }

    window.electronAPI.onLogData((data) => {
      appendLog(data);
    });

    window.electronAPI.onLogEnd((code) => {
      statusIndicator.classList.remove('status-active');
      statusIndicator.classList.add('status-inactive');
      statusText.textContent = `Stream ended (exit code: ${code})`;
      appendLog('\n--- Log stream ended ---\n');
    });

    clearBtn.addEventListener('click', () => {
      logContainer.innerHTML = '';
      lineCount = 0;
      lineCountEl.textContent = 'Lines: 0';
      appendLog('Logs cleared.');
    });

    closeBtn.addEventListener('click', () => {
      window.close();
    });
  </script>
</body>
</html>

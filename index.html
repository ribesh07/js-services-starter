<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J1soft Service Manager</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #667eea;
      --success: #48bb78;
      --danger: #f56565;
      --warning: #ed8936;
      --info: #4299e1;
      --secondary: #718096;
      --panel: #f7f9fc;
      --border: #e1e8ed;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-width: 1000px;
      min-height: 700px;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: clamp(16px, 1.5vw, 32px);
    }

    .container {
      width: 100%;
      height: 100%;
      max-width: 1800px;
      margin: 0 auto;
      background: white;
      border-radius: 18px;
      padding: clamp(22px, 2vw, 40px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);

      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    h1 {
      color: #333;
      font-size: clamp(24px, 1.8vw, 40px);
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      font-size: clamp(13px, 0.9vw, 18px);
      margin-bottom: clamp(18px, 1.5vw, 28px);
    }

    .directory-section,
    .settings-section,
    .service-selector {
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: clamp(16px, 1.2vw, 24px);
      margin-bottom: clamp(14px, 1vw, 22px);
    }

    .settings-section h3 {
      color: #333;
      font-size: clamp(15px, 1vw, 20px);
      margin-bottom: 14px;
    }

    .directory-path {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .path-display {
      flex: 1;
      min-width: 0;
      padding: clamp(10px, 0.9vw, 16px);
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: Consolas, monospace;
      font-size: clamp(12px, 0.8vw, 15px);
      color: #555;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .setting-item {
      margin-bottom: 12px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: clamp(13px, 0.85vw, 16px);
      color: #555;
    }

    .checkbox-label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .service-selector label {
      display: block;
      margin-bottom: 8px;
      font-size: clamp(13px, 0.9vw, 16px);
      font-weight: 600;
      color: #333;
    }

    .service-selector select {
      width: 100%;
      padding: clamp(10px, 0.9vw, 14px);
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: clamp(13px, 0.85vw, 15px);
      background: white;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: clamp(10px, 0.8vw, 14px) clamp(16px, 1vw, 24px);
      font-size: clamp(12px, 0.8vw, 14px);
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-warning { background: var(--warning); color: white; }
    .btn-info { background: var(--info); color: white; }
    .btn-secondary { background: var(--secondary); color: white; }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .status-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .status-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      gap: 12px;
    }

    .status-header h2 {
      font-size: clamp(18px, 1.2vw, 28px);
      color: #333;
    }

    .output-box {
      flex: 1;
      min-height: 0;
      background: #1e1e1e;
      color: #d4d4d4;
      padding: clamp(14px, 1vw, 22px);
      border-radius: 10px;
      border: 2px solid #333;
      font-family: Consolas, monospace;
      font-size: clamp(12px, 0.8vw, 15px);
      line-height: 1.6;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .output-box::-webkit-scrollbar {
      width: 10px;
    }

    .output-box::-webkit-scrollbar-track {
      background: #2d2d2d;
    }

    .output-box::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 6px;
    }

    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 8px;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Smaller desktop */
    @media (max-width: 1280px) {
      .controls {
        grid-template-columns: repeat(3, 1fr);
      }

      h1 {
        font-size: 24px;
      }
    }

    /* Large desktop / ultrawide */
    @media (min-width: 2200px) {
      .container {
        max-width: 2200px;
      }

      .controls {
        grid-template-columns: repeat(6, 1fr);
      }

      .output-box {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐳 J1Soft Service Manager</h1>
    <p class="subtitle">Manage your Services with ease</p>

    <div class="directory-section">
      <div class="directory-path">
        <div class="path-display" id="currentPath">No directory selected</div>
        <button class="btn-primary" id="selectDirBtn">Browse...</button>
      </div>
    </div>

    <div class="settings-section">
      <h3>⚙️ Settings</h3>

      <div class="setting-item">
        <label class="checkbox-label">
          <input type="checkbox" id="fixDirectoryCheck">
          <span>Remember directory (auto-load on startup)</span>
        </label>
      </div>

      <div class="setting-item">
        <label class="checkbox-label">
          <input type="checkbox" id="stopOnCloseCheck">
          <span>Stop containers when app closes</span>
        </label>
      </div>
    </div>

    <div class="service-selector" id="serviceSelector" style="display:none;">
      <label for="serviceSelect">Filter logs by service (optional):</label>
      <select id="serviceSelect">
        <option value="">All Services</option>
      </select>
    </div>

    <div class="controls" id="controls" style="display:none;">
      <button class="btn-success" id="upBtn">▶ Start</button>
      <button class="btn-danger" id="downBtn">⬛ Stop</button>
      <button class="btn-warning" id="restartBtn">🔄 Restart</button>
      <button class="btn-info" id="pullBtn">⬇ Pull Updates</button>
      <button class="btn-secondary" id="statusBtn">📊 Status</button>
      <button class="btn-primary" id="logsBtn">📋 View Logs</button>
    </div>

    <div class="status-section">
      <div class="status-header">
        <h2>Output</h2>
        <button class="btn-secondary" id="clearBtn">Clear</button>
      </div>

      <div class="output-box" id="output">
Ready. Select a directory containing docker-compose.yml to begin.
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
